spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/stu_info2026_test?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      encoding: UTF-8
      mode: never
      schema-locations: classpath:schema.sql,classpath:schema-routines.sql,classpath:schema-post-data.sql,classpath:schema-runtime-sync.sql

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.cd.entity
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: stu-info-2026-security-jwt-secret-key-for-spring-security
  expiration-minutes: 720

app:
  database:
    bootstrap:
      initialize-on-empty: true
      runtime-sync-on-startup: true
